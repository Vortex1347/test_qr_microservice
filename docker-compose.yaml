version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: qr_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: qr_db
    ports:
      - "688:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: